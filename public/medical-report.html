<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقرير الأدوية - الهلال الأحمر</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="dashboard-header">
        <div class="header-left">
            <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-right"></i></button>
            <div class="logo-small"><div class="crescent"></div></div>
            <h2>تقرير الأدوية والمواد الصحية</h2>
        </div>
        <div class="header-center"></div>
        <div class="header-right">
            <span id="userName">...</span>
        </div>
    </header>

    <div class="container" style="margin-top: 20px;">
        <div class="section-content">
            <div class="report-filters">
                <input type="text" id="searchMedical" placeholder="بحث...">
                <select id="filterExpiry">
                    <option value="all">جميع الأدوية</option>
                    <option value="expiring">منتهية الصلاحية قريباً</option>
                    <option value="expired">منتهية الصلاحية</option>
                    <option value="low">مخزون منخفض</option>
                </select>
                <button class="btn btn-primary" onclick="printReport()">طباعة</button>
            </div>
            <table class="data-table" id="medicalReportTable">
                <thead>
                    <tr>
                        <th>الاسم</th>
                        <th>التصنيف</th>
                        <th>الكمية</th>
                        <th>الوحدة</th>
                        <th>تاريخ الانتهاء</th>
                        <th>الحالة</th>
                    </tr>
                </thead>
                <tbody id="medicalReportBody"></tbody>
            </table>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script>
        const user = requireAuth(['manager', 'inventory_keeper']);
        updateUserDisplay();

        async function loadMedicalReport() {
            try {
                const items = await getInventory();
                const medicalItems = items.filter(i => i.category === 'medical');
                const tbody = document.getElementById('medicalReportBody');
                tbody.innerHTML = medicalItems.map(item => {
                    let status = 'جيد';
                    if (item.expiryDate) {
                        const today = new Date();
                        const expiry = new Date(item.expiryDate);
                        const daysLeft = Math.ceil((expiry - today) / (1000*60*60*24));
                        if (daysLeft < 0) status = 'منتهي الصلاحية';
                        else if (daysLeft < 30) status = 'قريب الانتهاء';
                    }
                    if (item.quantity <= item.minStock) status = 'مخزون منخفض';
                    return `<tr>
                        <td>${item.itemName}</td>
                        <td>${item.subCategory || 'عام'}</td>
                        <td>${item.quantity}</td>
                        <td>${item.unit}</td>
                        <td>${item.expiryDate || '-'}</td>
                        <td><span class="status ${status === 'جيد' ? 'active' : 'pending'}">${status}</span></td>
                    </tr>`;
                }).join('');
            } catch (error) {
                alert(error.message);
            }
        }

        function printReport() {
            window.print();
        }

        loadMedicalReport();
    </script>
</body>
</html>
