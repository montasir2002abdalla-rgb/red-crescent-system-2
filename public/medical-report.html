<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقرير الأدوية - الهلال الأحمر</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="report-page">
    <header class="dashboard-header">
        <div class="header-left">
            <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-right"></i></button>
            <div class="logo-small"><div class="crescent"></div></div>
            <h2>تقرير الأدوية والمواد الصحية</h2>
        </div>
        <div class="header-center"></div>
        <div class="header-right">
            <span id="userName">...</span>
        </div>
    </header>

    <div class="container" style="margin-top: 40px;">
        <div class="section-content">
            <div class="report-filters">
                <input type="text" id="searchMedical" placeholder="بحث باسم الدواء...">
                <select id="filterExpiry">
                    <option value="all">جميع الأدوية</option>
                    <option value="expiring">قريب الانتهاء</option>
                    <option value="expired">منتهية الصلاحية</option>
                    <option value="low">مخزون منخفض</option>
                </select>
                <button class="btn btn-primary" onclick="printReport()">طباعة</button>
            </div>
            <div style="overflow-x: auto;">
                <table class="data-table" id="medicalReportTable">
                    <thead>
                        <tr>
                            <th>الاسم</th>
                            <th>التصنيف</th>
                            <th>الكمية</th>
                            <th>الوحدة</th>
                            <th>تاريخ الانتهاء</th>
                            <th>الحالة</th>
                        </tr>
                    </thead>
                    <tbody id="medicalReportBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script>
        const user = requireAuth(['manager', 'inventory_keeper']);
        updateUserDisplay();

        let allItems = [];

        async function loadMedicalReport() {
            try {
                const items = await getInventory();
                allItems = items.filter(i => i.category === 'medical');
                renderTable(allItems);
            } catch (error) {
                alert(error.message);
            }
        }

        function getStatus(item) {
            let status = 'جيد';
            if (item.expiryDate) {
                const today = new Date();
                const expiry = new Date(item.expiryDate);
                const daysLeft = Math.ceil((expiry - today) / (1000*60*60*24));
                if (daysLeft < 0) status = 'منتهي الصلاحية';
                else if (daysLeft < 30) status = 'قريب الانتهاء';
            }
            if (item.quantity <= item.minStock && status === 'جيد') status = 'مخزون منخفض';
            return status;
        }

        function renderTable(items) {
            const tbody = document.getElementById('medicalReportBody');
            tbody.innerHTML = items.map(item => {
                const status = getStatus(item);
                return `
                    <tr>
                        <td data-label="الاسم">${item.itemName}</td>
                        <td data-label="التصنيف">${item.subCategory || 'عام'}</td>
                        <td data-label="الكمية">${item.quantity}</td>
                        <td data-label="الوحدة">${item.unit}</td>
                        <td data-label="تاريخ الانتهاء">${item.expiryDate || '-'}</td>
                        <td data-label="الحالة"><span class="status ${status === 'منتهي الصلاحية' ? 'rejected' : status === 'قريب الانتهاء' ? 'pending' : status === 'مخزون منخفض' ? 'warning' : 'active'}">${status}</span></td>
                    </tr>
                `;
            }).join('');
        }

        function filterMedical() {
            const search = document.getElementById('searchMedical').value.toLowerCase();
            const expiryFilter = document.getElementById('filterExpiry').value;
            const filtered = allItems.filter(item => {
                const matchesSearch = item.itemName.toLowerCase().includes(search);
                const status = getStatus(item);
                let matchesFilter = true;
                if (expiryFilter === 'expiring') matchesFilter = status === 'قريب الانتهاء';
                else if (expiryFilter === 'expired') matchesFilter = status === 'منتهي الصلاحية';
                else if (expiryFilter === 'low') matchesFilter = status === 'مخزون منخفض';
                return matchesSearch && matchesFilter;
            });
            renderTable(filtered);
        }

        document.getElementById('searchMedical').addEventListener('input', filterMedical);
        document.getElementById('filterExpiry').addEventListener('change', filterMedical);

        function printReport() {
            window.print();
        }

        loadMedicalReport();
    </script>
</body>
</html>
