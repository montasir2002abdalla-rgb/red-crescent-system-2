<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقرير طلبات المساعدة - الهلال الأحمر</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="report-page">
    <header class="dashboard-header">
        <div class="header-left">
            <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-right"></i></button>
            <div class="logo-small"><div class="crescent"></div></div>
            <h2>تقرير طلبات المساعدة</h2>
        </div>
        <div class="header-center"></div>
        <div class="header-right">
            <span id="userName">...</span>
        </div>
    </header>

    <div class="container" style="margin-top: 40px;">
        <div class="section-content">
            <div class="report-filters">
                <input type="text" id="searchRequests" placeholder="بحث باسم المستفيد...">
                <select id="filterStatus">
                    <option value="all">جميع الطلبات</option>
                    <option value="pending">معلقة</option>
                    <option value="in_progress">قيد التنفيذ</option>
                    <option value="completed">مكتملة</option>
                    <option value="rejected">مرفوضة</option>
                </select>
                <button class="btn btn-primary" onclick="printReport()">طباعة</button>
            </div>
            <div style="overflow-x: auto;">
                <table class="data-table" id="requestsReportTable">
                    <thead>
                        <tr>
                            <th>المستفيد</th>
                            <th>نوع الطلب</th>
                            <th>الوصف</th>
                            <th>الحالة</th>
                            <th>التاريخ</th>
                        </tr>
                    </thead>
                    <tbody id="requestsReportBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script>
        const user = requireAuth(['manager', 'employee']);
        updateUserDisplay();

        let allRequests = [];

        async function loadRequestsReport() {
            try {
                allRequests = await getAssistanceRequests();
                renderTable(allRequests);
            } catch (error) {
                alert(error.message);
            }
        }

        function renderTable(requests) {
            const tbody = document.getElementById('requestsReportBody');
            tbody.innerHTML = requests.map(r => `
                <tr>
                    <td data-label="المستفيد">${r.beneficiaryName || ''}</td>
                    <td data-label="نوع الطلب">${r.requestType}</td>
                    <td data-label="الوصف">${r.description}</td>
                    <td data-label="الحالة"><span class="status ${r.status}">${r.status === 'pending' ? 'معلق' : r.status === 'in_progress' ? 'قيد التنفيذ' : r.status === 'completed' ? 'مكتمل' : 'مرفوض'}</span></td>
                    <td data-label="التاريخ">${new Date(r.createdAt).toLocaleDateString('ar-EG')}</td>
                </tr>
            `).join('');
        }

        function filterRequests() {
            const search = document.getElementById('searchRequests').value.toLowerCase();
            const statusFilter = document.getElementById('filterStatus').value;
            const filtered = allRequests.filter(r => {
                const matchesSearch = r.beneficiaryName?.toLowerCase().includes(search) || false;
                const matchesStatus = statusFilter === 'all' || r.status === statusFilter;
                return matchesSearch && matchesStatus;
            });
            renderTable(filtered);
        }

        document.getElementById('searchRequests').addEventListener('input', filterRequests);
        document.getElementById('filterStatus').addEventListener('change', filterRequests);

        function printReport() {
            window.print();
        }

        loadRequestsReport();
    </script>
</body>
</html>
