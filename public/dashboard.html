<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - جمعية الهلال الأحمر</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="dashboard-header">
        <div class="header-left">
            <div class="logo-small">
                <div class="crescent"></div>
            </div>
            <h2>لوحة التحكم</h2>
        </div>
        <div class="header-center"></div>
        <div class="header-right">
            <div class="user-info">
                <span id="userName">جارٍ التحميل...</span>
                <span id="userRole" class="user-role"></span>
            </div>
            <button class="btn-logout" onclick="logout()" title="تسجيل الخروج">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </header>

    <aside class="sidebar" id="sidebar">
        <nav class="main-nav" id="mainNav"></nav>
        <button class="toggle-sidebar" onclick="toggleSidebar()">
            <i class="fas fa-chevron-right" id="toggleIcon"></i>
        </button>
    </aside>

    <main class="main-content" id="mainContent"></main>

    <div class="notifications-panel" id="notificationsPanel" style="display: none;">
        <div class="notifications-header">
            <h3><i class="fas fa-bell"></i> الإشعارات</h3>
            <button class="close-notifications" onclick="closeNotifications()">×</button>
        </div>
        <div class="notifications-list" id="notificationsList"></div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/pages/dashboard.js"></script>
    <script src="js/pages/change-password.js"></script>
</body>
</html>
