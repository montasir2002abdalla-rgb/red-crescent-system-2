<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تقرير التبرعات - الهلال الأحمر</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="report-page">
    <header class="dashboard-header">
        <div class="header-left">
            <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-right"></i></button>
            <div class="logo-small"><div class="crescent"></div></div>
            <h2>تقرير التبرعات</h2>
        </div>
        <div class="header-center"></div>
        <div class="header-right">
            <span id="userName">...</span>
        </div>
    </header>

    <div class="container" style="margin-top: 40px;">
        <div class="section-content">
            <div class="report-filters">
                <input type="text" id="searchDonations" placeholder="بحث باسم المتبرع...">
                <select id="filterStatus">
                    <option value="all">جميع التبرعات</option>
                    <option value="pending">معلقة</option>
                    <option value="completed">مكتملة</option>
                </select>
                <button class="btn btn-primary" onclick="printReport()">طباعة</button>
            </div>
            <div style="overflow-x: auto;">
                <table class="data-table" id="donationsReportTable">
                    <thead>
                        <tr>
                            <th>رقم</th>
                            <th>المتبرع</th>
                            <th>المبلغ</th>
                            <th>طريقة الدفع</th>
                            <th>الحالة</th>
                            <th>التاريخ</th>
                        </thead>
                    <tbody id="donationsReportBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script>
        const user = requireAuth(['manager', 'inventory_keeper']);
        updateUserDisplay();

        let allDonations = [];

        async function loadDonationsReport() {
            try {
                allDonations = await getDonations();
                renderTable(allDonations);
            } catch (error) {
                alert(error.message);
            }
        }

        function renderTable(donations) {
            const tbody = document.getElementById('donationsReportBody');
            tbody.innerHTML = donations.map(d => `
                <tr>
                    <td data-label="رقم">${d.id}</td>
                    <td data-label="المتبرع">${d.donorName}</td>
                    <td data-label="المبلغ">${d.amount}</td>
                    <td data-label="طريقة الدفع">${d.paymentMethod}</td>
                    <td data-label="الحالة"><span class="status ${d.status}">${d.status === 'pending' ? 'معلقة' : 'مكتملة'}</span></td>
                    <td data-label="التاريخ">${new Date(d.createdAt).toLocaleDateString('ar-EG')}</td>
                </tr>
            `).join('');
        }

        function filterDonations() {
            const search = document.getElementById('searchDonations').value.toLowerCase();
            const statusFilter = document.getElementById('filterStatus').value;
            const filtered = allDonations.filter(d => {
                const matchesSearch = search === '' || d.donorName.toLowerCase().includes(search);
                const matchesStatus = statusFilter === 'all' || d.status === statusFilter;
                return matchesSearch && matchesStatus;
            });
            renderTable(filtered);
        }

        document.getElementById('searchDonations').addEventListener('input', filterDonations);
        document.getElementById('filterStatus').addEventListener('change', filterDonations);

        function printReport() {
            window.print();
        }

        loadDonationsReport();
    </script>
</body>
</html>
