<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>إدارة المستخدمين - الهلال الأحمر</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        @media (max-width: 768px) {
            .stats-container { grid-template-columns: 1fr 1fr !important; }
            .filters { flex-direction: column; }
            .data-table { display: block; overflow-x: auto; white-space: nowrap; }
        }
        .filters { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .filters input, .filters select { padding: 8px; border: 1px solid #ddd; border-radius: 6px; flex: 1; }
        .badge { padding: 4px 8px; border-radius: 20px; font-size: 0.8rem; }
        .badge.active { background: #d4edda; color: #155724; }
        .badge.pending { background: #fff3cd; color: #856404; }
        .badge.rejected { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <header class="dashboard-header">
        <div class="header-left">
            <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-right"></i></button>
            <div class="logo-small"><div class="crescent"></div></div>
            <h2>إدارة المستخدمين</h2>
        </div>
        <div class="header-center"></div>
        <div class="header-right">
            <span id="userName">...</span>
        </div>
    </header>

    <div class="container" style="margin-top: 20px;">
        <!-- إحصائيات سريعة -->
        <div class="stats-container" style="display: grid; grid-template-columns: repeat(4,1fr); gap: 15px; margin-bottom: 25px;">
            <div class="stat-card">
                <i class="fas fa-users"></i>
                <div class="count" id="totalUsers">0</div>
                <div class="label">إجمالي المستخدمين</div>
            </div>
            <div class="stat-card">
                <i class="fas fa-check-circle"></i>
                <div class="count" id="acceptedRequests">0</div>
                <div class="label">طلبات مقبولة</div>  <!-- تم التصحيح -->
            </div>
            <div class="stat-card">
                <i class="fas fa-times-circle"></i>
                <div class="count" id="rejectedRequests">0</div>
                <div class="label">طلبات مرفوضة</div>  <!-- تم التصحيح -->
            </div>
            <div class="stat-card">
                <i class="fas fa-user-clock"></i>
                <div class="count" id="pendingUsers">0</div>
                <div class="label">بانتظار الموافقة</div>
            </div>
        </div>

        <!-- فلاتر وبحث -->
        <div class="filters">
            <input type="text" id="searchUser" placeholder="بحث بالاسم أو الرقم الوظيفي..." style="flex:2;">
            <select id="filterRole" style="flex:1;">
                <option value="">كل الأدوار</option>
                <option value="manager">مدير</option>
                <option value="inventory_keeper">أمين مخزن</option>
                <option value="employee">موظف</option>
                <option value="volunteer">متطوع</option>
                <option value="donor">مانح</option>
                <option value="beneficiary">مستفيد</option>
            </select>
            <select id="filterStatus" style="flex:1;">
                <option value="">كل الحالات</option>
                <option value="active">نشط</option>
                <option value="pending">معلق</option>
                <option value="rejected">مرفوض</option>
            </select>
        </div>

        <!-- جدول المستخدمين -->
        <div class="section-content">
            <h3>جميع المستخدمين</h3>
            <div id="usersTableWrapper" style="overflow-x: auto;">
                <table class="data-table" id="usersTable">
                    <thead>
                        <tr>
                            <th>الاسم</th>
                            <th>الرقم الوظيفي</th>
                            <th>البريد</th>
                            <th>الهاتف</th>
                            <th>الدور</th>
                            <th>الحالة</th>
                            <th>تاريخ التسجيل</th>
                            <th>إجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="usersBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- نافذة تأكيد الحذف -->
    <div id="deleteConfirmModal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close" onclick="closeDeleteModal()">&times;</span>
            <h3>تأكيد الحذف</h3>
            <p>هل أنت متأكد من حذف هذا المستخدم؟</p>
            <input type="hidden" id="deleteUserId">
            <button class="btn btn-danger" onclick="confirmDelete()">حذف</button>
            <button class="btn btn-secondary" onclick="closeDeleteModal()">إلغاء</button>
        </div>
    </div>

    <!-- نافذة تعديل المستخدم -->
    <div id="editUserModal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close" onclick="closeEditModal()">&times;</span>
            <h3>تعديل بيانات المستخدم</h3>
            <form id="editUserForm">
                <input type="hidden" id="editUserId">
                <div class="form-group">
                    <label>الاسم</label>
                    <input type="text" id="editName" required>
                </div>
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="editEmail" required>
                </div>
                <div class="form-group">
                    <label>رقم الهاتف</label>
                    <input type="tel" id="editPhone" required>
                </div>
                <div class="form-group">
                    <label>الدور</label>
                    <select id="editRole" required>
                        <option value="manager">مدير</option>
                        <option value="inventory_keeper">أمين مخزن</option>
                        <option value="employee">موظف</option>
                        <option value="volunteer">متطوع</option>
                        <option value="donor">مانح</option>
                        <option value="beneficiary">مستفيد</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>الحالة</label>
                    <select id="editStatus" required>
                        <option value="active">نشط</option>
                        <option value="pending">معلق</option>
                        <option value="rejected">مرفوض</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">حفظ التغييرات</button>
            </form>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/pages/users-management.js"></script>
</body>
</html>
