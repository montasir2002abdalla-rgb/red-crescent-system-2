<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الموافقات - الهلال الأحمر</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="dashboard-header">
        <div class="header-left">
            <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-right"></i></button>
            <div class="logo-small"><div class="crescent"></div></div>
            <h2>الموافقات المعلقة</h2>
        </div>
        <div class="header-center"></div>
        <div class="header-right">
            <span id="userName">...</span>
        </div>
    </header>

    <div class="container" style="margin-top: 20px;">
        <div class="section-content">
            <table class="data-table" id="pendingTable">
                <thead>
                    <tr>
                        <th>الاسم</th>
                        <th>الرقم الوظيفي</th>
                        <th>البريد الإلكتروني</th>
                        <th>الدور المطلوب</th>
                        <th>تاريخ الطلب</th>
                        <th>الإجراءات</th>
                    </tr>
                </thead>
                <tbody id="pendingBody"></tbody>
            </table>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script>
        const user = requireAuth('manager');
        updateUserDisplay();

        async function loadPending() {
            try {
                const users = await getPendingUsers();
                const tbody = document.getElementById('pendingBody');
                tbody.innerHTML = users.map(u => `
                    <tr>
                        <td>${u.name}</td>
                        <td>${u.employeeId}</td>
                        <td>${u.email}</td>
                        <td>${getRoleName(u.role)}</td>
                        <td>${new Date(u.createdAt).toLocaleDateString('ar-EG')}</td>
                        <td>
                            <button class="btn btn-primary" onclick="approve(${u.id})">موافقة</button>
                            <button class="btn btn-secondary" onclick="reject(${u.id})">رفض</button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                alert(error.message);
            }
        }

        window.approve = async (id) => {
            if (confirm('هل أنت متأكد من الموافقة على هذا الطلب؟')) {
                try {
                    await approveUser(id);
                    loadPending();
                } catch (error) {
                    alert(error.message);
                }
            }
        };

        window.reject = async (id) => {
            if (confirm('هل أنت متأكد من رفض هذا الطلب؟')) {
                try {
                    await rejectUser(id);
                    loadPending();
                } catch (error) {
                    alert(error.message);
                }
            }
        };

        loadPending();
    </script>
</body>
</html>
