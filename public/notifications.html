<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التنبيهات والشكاوى - الهلال الأحمر</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="dashboard-header">
        <div class="header-left">
            <button class="back-btn" onclick="history.back()"><i class="fas fa-arrow-right"></i></button>
            <div class="logo-small"><div class="crescent"></div></div>
            <h2>التنبيهات والشكاوى</h2>
        </div>
        <div class="header-center"></div>
        <div class="header-right">
            <span id="userName">...</span>
        </div>
    </header>

    <div class="container" style="margin-top: 20px;">
        <div class="section-content">
            <div class="tabs">
                <button class="tab active" onclick="showTab('notifications')">التنبيهات</button>
                <button class="tab" onclick="showTab('complaints')">الشكاوى</button>
                <button class="tab" onclick="showTab('new')">إرسال جديد</button>
            </div>

            <div id="notificationsTab" class="tab-content active">
                <h3>التنبيهات الواردة</h3>
                <div id="notificationsList" class="complaints-list"></div>
            </div>

            <div id="complaintsTab" class="tab-content">
                <h3>الشكاوى المقدمة</h3>
                <div id="complaintsList" class="complaints-list"></div>
            </div>

            <div id="newTab" class="tab-content">
                <h3>إرسال تنبيه / شكوى</h3>
                <form id="complaintForm">
                    <div class="form-group">
                        <label>النوع</label>
                        <select id="complaintType" required>
                            <option value="notification">تنبيه</option>
                            <option value="complaint">شكوى</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>الرسالة</label>
                        <textarea id="complaintMessage" required rows="5"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">إرسال</button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/pages/notifications.js"></script>
</body>
</html>
